<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" style=""><defs><mask id="imagine-text-gaps-2thx2d" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="300" fill="white"/><rect x="100.7109375" y="57" width="478.578125" height="129" fill="black" rx="2"/><rect x="205.5703125" y="174" width="268.859375" height="36" fill="black" rx="2"/><rect x="208.1484375" y="228" width="262.703125" height="23" fill="black" rx="2"/></mask></defs>
